<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snip — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #030712;
      --surface:   #111827;
      --surface-glow: rgba(31, 41, 55, 0.4);
      --border:    rgba(255, 255, 255, 0.08);
      --border-hi: rgba(255, 255, 255, 0.16);
      --violet:    #8B5CF6;
      --violet-hi: #A78BFA;
      --violet-dim:rgba(139, 92, 246, 0.15);
      --green:     #10B981;
      --red:       #EF4444;
      --text:      #F9FAFB;
      --muted:     #9CA3AF;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Plus Jakarta Sans', system-ui, sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.15), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(16, 185, 129, 0.05), transparent 30%);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 640px;
      padding: 2rem 0 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      background: linear-gradient(to right, #FFF, var(--violet-hi));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span {
      color: var(--violet-hi);
      -webkit-text-fill-color: var(--violet-hi);
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }

    .url-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
      min-width: 0;
    }

    .url-input::placeholder { color: #4B5563; }

    .url-input:focus {
      border-color: var(--violet);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
    }

    .btn-shorten {
      background: var(--violet);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 1.75rem;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .btn-shorten:hover { 
      background: var(--violet-hi);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }
    .btn-shorten:active { transform: translateY(1px); }
    .btn-shorten:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Status / Error ── */
    .status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      min-height: 1.5rem;
      padding-left: 0.25rem;
      font-weight: 500;
    }

    .status.error { color: var(--red); }
    .status.loading { color: var(--violet-hi); }

    /* ── Result ── */
    .result {
      margin-top: 1.5rem;
      background: var(--violet-dim);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 14px;
      padding: 1.25rem;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .result.visible { display: flex; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--violet-hi);
      font-weight: 700;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .short-url {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 500;
      color: #FFF;
      text-decoration: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .short-url:hover { text-decoration: underline; color: var(--violet-hi); }

    .btn-copy {
      background: #FFF;
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-copy:hover { background: var(--violet-hi); color: #FFF; }
    .btn-copy.copied { background: var(--green); color: #FFF; }

    .original-preview {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 0.5rem;
      margin-top: 0.25rem;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0 1.5rem;
    }

    /* ── History ── */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .history-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 700;
    }

    .btn-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s ease;
    }

    .btn-clear:hover { color: var(--red); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .history-item:hover { 
      border-color: var(--border-hi); 
      background: rgba(0, 0, 0, 0.25);
    }

    .history-short {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--violet-hi);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
    }

    .history-short:hover { text-decoration: underline; }

    .history-arrow {
      color: #374151;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .history-original {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .history-copy {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.25rem;
      transition: color 0.2s ease;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .history-copy:hover { color: #FFF; }
    .history-copy.copied { color: var(--green); }

    .empty-history {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      padding-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    footer a { 
      color: var(--text); 
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed var(--muted);
      transition: all 0.2s ease;
    }
    footer a:hover { color: var(--violet-hi); border-bottom-color: var(--violet-hi); }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-shorten.loading .spinner { display: block; }
    .btn-shorten.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile Optimization (Responsive) ── */
    @media (max-width: 600px) {
      body { font-size: 15px; }
      .page { padding: 1rem 0.75rem 3rem; }
      header { padding: 1.5rem 0 2rem; }
      .logo { font-size: 2.2rem; }
      
      .card { padding: 1.5rem 1.25rem; border-radius: 16px; }
      
      .input-row { flex-direction: column; gap: 0.65rem; }
      .url-input { padding: 0.85rem 1rem; font-size: 1rem; } /* 1rem stops iOS auto-zoom */
      .btn-shorten { padding: 0.9rem; height: 48px; }
      
      .result-row { flex-direction: column; align-items: stretch; gap: 0.65rem; }
      .btn-copy { padding: 0.75rem; text-align: center; }
      
      .history-item { padding: 0.75rem; gap: 0.5rem; flex-wrap: wrap; }
      .history-original { width: 100%; flex: none; order: 3; padding-left: 0; color: #6B7280; margin-top: 0.15rem;}
      .history-short { flex: 1; }
      .history-arrow { display: none; }
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">snip<span>.</span></div>
    <p class="tagline">Paste long. Get short.</p>
  </header>

  <main class="card">

    <!-- Input -->
    <div class="input-row">
      <input
        id="urlInput"
        class="url-input"
        type="url"
        placeholder="https://example.com/very/long/url..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="shortenBtn" class="btn-shorten" onclick="shortenUrl()">
        <span class="btn-label">Shorten</span>
        <div class="spinner"></div>
      </button>
    </div>

    <div id="status" class="status"></div>

    <!-- Result -->
    <div id="result" class="result">
      <span class="result-label">Your short link</span>
      <div class="result-row">
        <a id="resultShortUrl" class="short-url" href="#" target="_blank" rel="noopener"></a>
        <button id="copyBtn" class="btn-copy" onclick="copyResult()">Copy</button>
      </div>
      <div id="resultOriginal" class="original-preview"></div>
    </div>

    <!-- History -->
    <hr class="divider" />
    <div class="history-header">
      <span class="history-title">Recent Links</span>
      <button class="btn-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="historyList" class="history-list"></div>

  </main>

  <footer>
    Built with Spring Boot · <a href="https://github.com/samar-exe/url-shortener" target="_blank" rel="noopener">GitHub</a>
  </footer>
</div>

<script>
  const API = '/api/urls/shorten';
  const HISTORY_KEY = 'snip_history';
  const MAX_HISTORY = 10;

  let lastShortUrl = '';
  let lastOriginalUrl = '';

  // ── Shorten ──────────────────────────────────────────────
  async function shortenUrl() {
    const input = document.getElementById('urlInput');
    const btn   = document.getElementById('shortenBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    const url = input.value.trim();
    if (!url) { showStatus('Please enter a URL.', 'error'); return; }

    // Auto-prepend protocol if missing
    const finalUrl = /^https?:\/\//i.test(url) ? url : 'https://' + url;

    setLoading(true, btn);
    showStatus('Shortening...', 'loading');
    result.classList.remove('visible');

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: finalUrl }),
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data.message || data.url || 'Something went wrong.';
        showStatus(msg, 'error');
        return;
      }

      lastShortUrl    = data.shortUrl;
      lastOriginalUrl = finalUrl;

      // Show result
      const shortLink = document.getElementById('resultShortUrl');
      shortLink.href        = lastShortUrl;
      shortLink.textContent = lastShortUrl;
      document.getElementById('resultOriginal').textContent = finalUrl;
      document.getElementById('copyBtn').textContent = 'Copy';
      document.getElementById('copyBtn').classList.remove('copied');
      result.classList.add('visible');

      showStatus('', '');
      input.value = '';
      addToHistory(lastShortUrl, finalUrl);

    } catch (err) {
      showStatus('Could not reach the server. Is the backend running?', 'error');
    } finally {
      setLoading(false, btn);
    }
  }

  // ── Copy result ──────────────────────────────────────────
  function copyResult() {
    copyToClipboard(lastShortUrl, document.getElementById('copyBtn'));
  }

  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const isIcon = btn.tagName.toLowerCase() !== 'button' || btn.classList.contains('history-copy');
      if (isIcon) {
        btn.innerHTML = '✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = '⎘';
          btn.classList.remove('copied');
        }, 2000);
      } else {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      }
    });
  }

  // ── History ──────────────────────────────────────────────
  function addToHistory(shortUrl, originalUrl) {
    let history = getHistory();
    history = history.filter(h => h.shortUrl !== shortUrl);
    history.unshift({ shortUrl, originalUrl, ts: Date.now() });
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch { return []; }
  }

  function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const history = getHistory();

    if (history.length === 0) {
      list.innerHTML = '<p class="empty-history">No links yet — shorten something above.</p>';
      return;
    }

    list.innerHTML = history.map((h, i) => `
      <div class="history-item">
        <a class="history-short" href="${h.shortUrl}" target="_blank" rel="noopener">${h.shortUrl}</a>
        <span class="history-arrow">→</span>
        <span class="history-original" title="${h.originalUrl}">${h.originalUrl}</span>
        <button class="history-copy" id="hcopy${i}" onclick="copyToClipboard('${h.shortUrl}', document.getElementById('hcopy${i}'))">⎘</button>
      </div>
    `).join('');
  }

  // ── Utils ─────────────────────────────────────────────────
  function setLoading(on, btn) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  // Enter key shortcut
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') shortenUrl();
  });

  // Init
  renderHistory();
</script>
</body>
</html>
