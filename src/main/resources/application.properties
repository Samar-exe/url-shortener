spring.application.name=url-shortener
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/urlshortener}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
app.base-url=${BASE_URL:http://localhost:8080}
app.default-expiry-days=365
rate-limit.max-requests=100
rate-limit.window-seconds=60
server.port=${PORT:8080}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
