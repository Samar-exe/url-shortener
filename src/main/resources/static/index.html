<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snip — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0A0F1E;
      --surface:   #111827;
      --border:    #1F2937;
      --border-hi: #374151;
      --violet:    #7C3AED;
      --violet-hi: #9461FF;
      --violet-dim:#3B1F7A;
      --green:     #10B981;
      --red:       #EF4444;
      --text:      #F1F5F9;
      --muted:     #64748B;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', system-ui, sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 680px;
      padding: 2.5rem 0 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
    }

    .logo {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .logo span {
      color: var(--violet-hi);
    }

    .tagline {
      font-size: 0.875rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .url-input::placeholder { color: var(--muted); }

    .url-input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .btn-shorten {
      background: var(--violet);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.4rem;
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-shorten:hover { background: var(--violet-hi); }
    .btn-shorten:active { transform: scale(0.97); }
    .btn-shorten:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Status / Error ── */
    .status {
      margin-top: 1rem;
      font-size: 0.8rem;
      min-height: 1.2rem;
    }

    .status.error { color: var(--red); }
    .status.loading { color: var(--muted); }

    /* ── Result ── */
    .result {
      margin-top: 1.25rem;
      background: var(--bg);
      border: 1px solid var(--violet-dim);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: none;
      flex-direction: column;
      gap: 0.6rem;
      animation: slideIn 0.25s ease;
    }

    .result.visible { display: flex; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .short-url {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--violet-hi);
      text-decoration: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .short-url:hover { text-decoration: underline; }

    .btn-copy {
      background: var(--violet-dim);
      color: var(--violet-hi);
      border: 1px solid var(--violet-dim);
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-copy:hover { background: #4C1D95; }
    .btn-copy.copied { background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.3); }

    .original-preview {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0 1.25rem;
    }

    /* ── History ── */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .history-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .btn-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .btn-clear:hover { color: var(--red); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.15s;
    }

    .history-item:hover { border-color: var(--border-hi); }

    .history-short {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--violet-hi);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .history-short:hover { text-decoration: underline; }

    .history-arrow {
      color: var(--border-hi);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .history-original {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .history-copy {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0 0.2rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .history-copy:hover { color: var(--violet-hi); }
    .history-copy.copied { color: var(--green); }

    .empty-history {
      text-align: center;
      padding: 1.5rem 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    footer a { color: var(--muted); }
    footer a:hover { color: var(--violet-hi); }

    /* ── Spinner ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-shorten.loading .spinner { display: block; }
    .btn-shorten.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .card { padding: 1.25rem; }
      .input-row { flex-direction: column; }
      .btn-shorten { justify-content: center; }
      .logo { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">snip<span>.</span></div>
    <p class="tagline">Paste long. Get short.</p>
  </header>

  <main class="card">

    <!-- Input -->
    <div class="input-row">
      <input
        id="urlInput"
        class="url-input"
        type="url"
        placeholder="https://example.com/very/long/url..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="shortenBtn" class="btn-shorten" onclick="shortenUrl()">
        <span class="btn-label">Shorten</span>
        <div class="spinner"></div>
      </button>
    </div>

    <div id="status" class="status"></div>

    <!-- Result -->
    <div id="result" class="result">
      <span class="result-label">Your short link</span>
      <div class="result-row">
        <a id="resultShortUrl" class="short-url" href="#" target="_blank" rel="noopener"></a>
        <button id="copyBtn" class="btn-copy" onclick="copyResult()">Copy</button>
      </div>
      <div id="resultOriginal" class="original-preview"></div>
    </div>

    <!-- History -->
    <hr class="divider" />
    <div class="history-header">
      <span class="history-title">Recent</span>
      <button class="btn-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="historyList" class="history-list"></div>

  </main>

  <footer>
    Built with Spring Boot · <a href="https://github.com/samar-exe/url-shortner" target="_blank" rel="noopener">GitHub</a>
  </footer>
</div>

<script>
  const API = '/api/urls/shorten';
  const HISTORY_KEY = 'snip_history';
  const MAX_HISTORY = 10;

  let lastShortUrl = '';
  let lastOriginalUrl = '';

  // ── Shorten ──────────────────────────────────────────────
  async function shortenUrl() {
    const input = document.getElementById('urlInput');
    const btn   = document.getElementById('shortenBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    const url = input.value.trim();
    if (!url) { showStatus('Please enter a URL.', 'error'); return; }

    // Auto-prepend protocol if missing
    const finalUrl = /^https?:\/\//i.test(url) ? url : 'https://' + url;

    setLoading(true, btn);
    showStatus('Shortening...', 'loading');
    result.classList.remove('visible');

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: finalUrl }),
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data.message || data.url || 'Something went wrong.';
        showStatus(msg, 'error');
        return;
      }

      lastShortUrl    = data.shortUrl;
      lastOriginalUrl = finalUrl;

      // Show result
      const shortLink = document.getElementById('resultShortUrl');
      shortLink.href        = lastShortUrl;
      shortLink.textContent = lastShortUrl;
      document.getElementById('resultOriginal').textContent = finalUrl;
      document.getElementById('copyBtn').textContent = 'Copy';
      document.getElementById('copyBtn').classList.remove('copied');
      result.classList.add('visible');

      showStatus('', '');
      input.value = '';
      addToHistory(lastShortUrl, finalUrl);

    } catch (err) {
      showStatus('Could not reach the server. Is the backend running?', 'error');
    } finally {
      setLoading(false, btn);
    }
  }

  // ── Copy result ──────────────────────────────────────────
  function copyResult() {
    copyToClipboard(lastShortUrl, document.getElementById('copyBtn'));
  }

  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ── History ──────────────────────────────────────────────
  function addToHistory(shortUrl, originalUrl) {
    let history = getHistory();
    history = history.filter(h => h.shortUrl !== shortUrl);
    history.unshift({ shortUrl, originalUrl, ts: Date.now() });
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch { return []; }
  }

  function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const history = getHistory();

    if (history.length === 0) {
      list.innerHTML = '<p class="empty-history">No links yet — shorten something above.</p>';
      return;
    }

    list.innerHTML = history.map((h, i) => `
      <div class="history-item">
        <a class="history-short" href="${h.shortUrl}" target="_blank" rel="noopener">${h.shortUrl}</a>
        <span class="history-arrow">→</span>
        <span class="history-original" title="${h.originalUrl}">${h.originalUrl}</span>
        <button class="history-copy" id="hcopy${i}" onclick="copyToClipboard('${h.shortUrl}', document.getElementById('hcopy${i}'))">⎘</button>
      </div>
    `).join('');
  }

  // ── Utils ─────────────────────────────────────────────────
  function setLoading(on, btn) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  // Enter key shortcut
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') shortenUrl();
  });

  // Init
  renderHistory();
</script>
</body>
</html>
